<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Вова против бургеров</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#101010;font-family:Arial,sans-serif;touch-action:none;user-select:none}#box{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#111}canvas{background:#20242a;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;display:block;border:2px solid #555}.pad{position:fixed;inset:0;pointer-events:none}.b{position:absolute;width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.45);color:#fff;font:bold 30px Arial;display:flex;align-items:center;justify-content:center;pointer-events:auto}.small{position:absolute;top:14px;right:14px;border-radius:12px;padding:10px 14px;background:rgba(255,255,255,.18);color:#fff;font:bold 15px Arial;pointer-events:auto}#l{left:18px;bottom:24px}#r{left:108px;bottom:24px}#u{right:22px;bottom:112px}#hit{right:22px;bottom:24px}@media(min-width:900px){.b{opacity:.5}}
</style></head><body><div id="box"><canvas id="c" width="960" height="540"></canvas></div><div class="pad"><div id="reset" class="small">Рестарт</div><div id="l" class="b">←</div><div id="r" class="b">→</div><div id="u" class="b">↑</div><div id="hit" class="b">⚡</div></div>
<script>
(function(){
'use strict';
var c=document.getElementById('c'),x=c.getContext('2d'),W=960,H=540;
var keys={l:0,r:0,u:0,h:0},cam=0,li=0,state='play',msg=160;
var levels=[
{name:'Уровень 1: День груди',w:2300,start:[70,390],plats:[[0,495,2300,45],[260,415,190,22],[560,355,180,22],[860,430,220,22],[1190,360,190,22],[1480,305,180,22],[1760,410,260,22]],pro:[[315,365],[615,305],[920,380],[1260,310],[1545,255],[1870,360]],burg:[[720,444,640,820],[1100,444,1080,1360],[1660,444,1600,1850]],exit:[2140,407,70,88]},
{name:'Уровень 2: Сушка',w:2850,start:[60,390],plats:[[0,495,2850,45],[250,405,160,22],[520,330,170,22],[800,420,170,22],[1080,345,220,22],[1410,275,180,22],[1710,380,190,22],[2010,320,220,22],[2380,405,250,22]],pro:[[300,355],[580,280],[855,370],[1135,295],[1480,225],[1775,330],[2085,270],[2495,355]],burg:[[450,444,420,630],[980,444,920,1220],[1570,444,1510,1740],[2260,444,2200,2520]],exit:[2700,407,70,88]}
];
var p,pro,burg;
function R(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function reset(){var L=levels[li];p={x:L.start[0],y:L.start[1],w:44,h:76,vx:0,vy:0,g:0,face:1,hp:3,inv:0,cd:0,atk:0,score:0};pro=L.pro.map(function(q){return{x:q[0],y:q[1],w:26,h:38,got:0}});burg=L.burg.map(function(q){return{x:q[0],y:q[1],w:66,h:51,min:q[2],max:q[3],vx:1.25,hp:2,dead:0,flash:0}});cam=0;state='play';msg=160}
function hurt(fall){p.hp--;p.inv=80;if(fall){var L=levels[li];p.x=L.start[0];p.y=L.start[1];p.vx=p.vy=0}else{p.vx=-p.face*8;p.vy=-7}if(p.hp<=0)state='lose'}
function atkBox(){return{x:p.face>0?p.x+p.w-2:p.x-44,y:p.y+20,w:50,h:32}}
function update(){if(state!=='play')return;var L=levels[li];if(msg>0)msg--; if(p.inv>0)p.inv--; if(p.cd>0)p.cd--; if(p.atk>0)p.atk--;
 if(keys.l){p.vx-=.6;p.face=-1} if(keys.r){p.vx+=.6;p.face=1} if(!keys.l&&!keys.r)p.vx*=.82; p.vx=Math.max(-6.5,Math.min(6.5,p.vx));
 if(keys.u&&p.g){p.vy=-14.5;p.g=0} if(keys.h&&p.cd<=0){p.cd=25;p.atk=10;var ab=atkBox();burg.forEach(function(b){if(!b.dead&&R(ab,b)){b.hp--;b.flash=10;b.vx=p.face*3.2;if(b.hp<=0)b.dead=1}})}
 p.vy+=.72;p.x+=p.vx;p.y+=p.vy;p.g=0;
 L.plats.forEach(function(a){var o={x:a[0],y:a[1],w:a[2],h:a[3]}; if(R(p,o)){ if(p.vy>0&&p.y+p.h-p.vy<=o.y+8){p.y=o.y-p.h;p.vy=0;p.g=1}else if(p.vy<0&&p.y-p.vy>=o.y+o.h-8){p.y=o.y+o.h;p.vy=0}else if(p.vx>0){p.x=o.x-p.w;p.vx=0}else if(p.vx<0){p.x=o.x+o.w;p.vx=0}}});
 p.x=Math.max(0,Math.min(L.w-p.w,p.x)); if(p.y>H+120)hurt(1);
 pro.forEach(function(q){if(!q.got&&R(p,q)){q.got=1;p.score++}});
 burg.forEach(function(b){if(b.dead)return;if(b.flash>0)b.flash--;b.x+=b.vx;if(b.x<b.min||b.x>b.max)b.vx*=-1;if(R(p,b)&&p.inv<=0){if(p.vy>2&&p.y+p.h-p.vy<b.y+16){b.dead=1;p.vy=-10}else hurt(0)}});
 var e={x:L.exit[0],y:L.exit[1],w:L.exit[2],h:L.exit[3]}; if(p.score===pro.length&&R(p,e)){if(li<levels.length-1){li++;reset()}else state='win'} cam=Math.max(0,Math.min(L.w-W,p.x-W*.42));}
function bg(){var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#303842');g.addColorStop(1,'#151515');x.fillStyle=g;x.fillRect(0,0,W,H);var ox=(-cam*.32)%220;x.fillStyle='#424a53';for(var i=ox-220;i<W+220;i+=220){x.fillRect(i,92,145,120);x.fillStyle='#222831';x.fillRect(i+10,103,125,98);x.fillStyle='#424a53'} x.strokeStyle='#858585';x.lineWidth=6;for(i=((-cam*.25)%360)-360;i<W+360;i+=360){x.beginPath();x.moveTo(i+35,470);x.lineTo(i+90,310);x.lineTo(i+145,470);x.stroke();x.fillStyle='#555';x.fillRect(i+25,303,130,12);x.fillStyle='#1b1b1b';x.beginPath();x.arc(i+25,309,21,0,7);x.arc(i+155,309,21,0,7);x.fill();x.strokeStyle='#999';x.strokeRect(i+230,355,95,15);x.strokeRect(i+270,370,24,102)} x.fillStyle='rgba(255,255,255,.08)';x.fillRect(0,0,W,66);x.fillStyle='#f5d465';x.font='bold 28px Arial';x.fillText('GYM OF POWER',32,42)}
function plat(a){var px=a[0]-cam;x.fillStyle='#353535';x.fillRect(px,a[1],a[2],a[3]);x.fillStyle='#666';x.fillRect(px,a[1],a[2],7);x.fillStyle='#1f1f1f';x.fillRect(px,a[1]+a[3]-5,a[2],5)}
function protein(q){if(q.got)return;var px=q.x-cam;x.fillStyle='#dffaff';x.fillRect(px+4,q.y+8,18,28);x.fillStyle='#36b7ff';x.fillRect(px+2,q.y+4,22,9);x.fillStyle='#fff';x.fillRect(px+6,q.y+16,14,12);x.fillStyle='#111';x.font='bold 8px Arial';x.fillText('PRO',px+6,q.y+26)}
function burger(b){if(b.dead)return;var px=b.x-cam,py=b.y;x.save();if(b.flash)x.globalAlpha=.55;x.fillStyle='#d99a36';x.beginPath();x.ellipse(px+33,py+13,34,18,0,Math.PI,0);x.fill();x.fillStyle='#6e3518';x.fillRect(px+4,py+18,58,12);x.fillStyle='#67b64a';x.fillRect(px+7,py+30,52,8);x.fillStyle='#ffcf48';x.fillRect(px+5,py+36,56,8);x.fillStyle='#d99a36';x.fillRect(px+3,py+42,60,9);x.fillStyle='#111';x.beginPath();x.arc(px+22,py+15,3,0,7);x.arc(px+45,py+15,3,0,7);x.fill();x.restore()}
function player(){var px=p.x-cam,py=p.y;if(p.inv&&Math.floor(p.inv/6)%2===0)return;x.save();x.translate(px+p.w/2,py);x.scale(p.face,1);x.translate(-p.w/2,0);x.fillStyle='#26344d';x.fillRect(10,48,10,25);x.fillRect(25,48,10,25);x.fillStyle='#111';x.fillRect(7,70,15,6);x.fillRect(24,70,15,6);x.fillStyle='#fff';x.fillRect(11,22,23,31);x.fillStyle='#f0bf8d';x.beginPath();x.arc(8,32,9,0,7);x.arc(37,32,9,0,7);x.fill();x.fillRect(2,32,10,20);x.fillRect(34,32,10,20);x.fillStyle='#f2c99b';x.beginPath();x.arc(22,13,13,0,7);x.fill();x.fillStyle='#f3dc54';x.beginPath();x.ellipse(22,5,15,8,0,0,7);x.fill();x.fillStyle='#111';x.beginPath();x.arc(27,13,2,0,7);x.fill();x.strokeStyle='#111';x.lineWidth=2;x.beginPath();x.moveTo(24,20);x.lineTo(32,20);x.stroke();if(p.atk){x.fillStyle='rgba(255,230,70,.55)';x.fillRect(39,25,46,13);x.fillStyle='#fff36b';x.font='bold 14px Arial';x.fillText('БАМ!',43,37)}x.restore()}
function exit(){var e=levels[li].exit,px=e[0]-cam;x.fillStyle='#222';x.fillRect(px,e[1],e[2],e[3]);x.fillStyle=p.score===pro.length?'#38d66b':'#666';x.fillRect(px+9,e[1]+10,e[2]-18,e[3]-20);x.fillStyle='#111';x.font='bold 13px Arial';x.fillText('NEXT',px+17,e[1]+50);if(p.score<pro.length){x.fillStyle='rgba(255,255,255,.85)';x.font='12px Arial';x.fillText('собери банки',px-7,e[1]-8)}}
function ui(){x.fillStyle='rgba(0,0,0,.48)';x.fillRect(0,0,W,66);x.fillStyle='#fff';x.font='bold 20px Arial';x.fillText(levels[li].name,18,28);x.font='16px Arial';x.fillText('Протеин: '+p.score+'/'+pro.length,18,53);x.fillText('HP: '+Array(p.hp+1).join('❤'),190,53);x.fillStyle='#f5d66a';x.fillText('←/→ бег, ↑ прыжок, ⚡ удар',520,42);if(msg>0){x.fillStyle='rgba(0,0,0,.6)';x.fillRect(245,88,475,58);x.fillStyle='#fff';x.font='bold 20px Arial';x.fillText('Собери все банки протеина и зайди в NEXT',275,124)}}
function end(){x.fillStyle='rgba(0,0,0,.72)';x.fillRect(0,0,W,H);x.textAlign='center';x.fillStyle='#fff';x.font='bold 42px Arial';x.fillText(state==='win'?'Вова зачистил зал!':'Бургеры победили...',W/2,H/2-25);x.font='22px Arial';x.fillText('Нажми Рестарт',W/2,H/2+22);x.textAlign='left'}
function draw(){bg();levels[li].plats.forEach(plat);exit();pro.forEach(protein);burg.forEach(burger);player();ui();if(state!=='play')end()}
function loop(){try{update();draw()}catch(e){x.fillStyle='#111';x.fillRect(0,0,W,H);x.fillStyle='#fff';x.font='20px Arial';x.fillText('Ошибка: '+e.message,30,60)}requestAnimationFrame(loop)}
function set(k,v){keys[k]=v?1:0}
window.addEventListener('keydown',function(e){if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')set('l',1); if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')set('r',1); if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')set('u',1); if(e.key==='j'||e.key==='J')set('h',1); if(e.key==='Enter'&&state!=='play'){li=0;reset()}});
window.addEventListener('keyup',function(e){if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')set('l',0); if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')set('r',0); if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' ')set('u',0); if(e.key==='j'||e.key==='J')set('h',0)});
function bind(id,k){var el=document.getElementById(id);function d(e){e.preventDefault();set(k,1)}function u(e){e.preventDefault();set(k,0)}el.addEventListener('touchstart',d,{passive:false});el.addEventListener('touchend',u,{passive:false});el.addEventListener('touchcancel',u,{passive:false});el.addEventListener('mousedown',d);window.addEventListener('mouseup',u)}
bind('l','l');bind('r','r');bind('u','u');bind('hit','h');document.getElementById('reset').onclick=function(){li=0;reset()};reset();loop();
})();
</script></body></html>
